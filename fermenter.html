<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F3EE;
    --bg2: #EDE8E1;
    --bg3: #E3DDD5;
    --ink: #2A2825;
    --ink2: #6B6560;
    --ink3: #9C978F;
    --amber: #C8862A;
    --amber-light: #F5E8D0;
    --green: #5A7A4E;
    --green-light: #DDE8D8;
    --red: #B04040;
    --red-light: #F0DDDD;
    --blue: #3A6080;
    --blue-light: #D8E5EF;
    --border: rgba(42,40,37,0.12);
    --border2: rgba(42,40,37,0.22);
    --radius: 10px;
    --radius-lg: 16px;
  }

  html { font-size: 16px; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--bg);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--bg);
  }
  header span {
    font-size: 0.8rem;
    color: var(--ink3);
    font-style: italic;
  }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1rem 0;
  }
  .sidebar-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    padding: 0 1rem 0.5rem;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.12s, border-color 0.12s;
    text-decoration: none;
    color: var(--ink);
  }
  .sidebar-item:hover { background: var(--bg3); }
  .sidebar-item.active {
    background: var(--bg);
    border-left-color: var(--amber);
  }
  .sidebar-item .si-emoji { font-size: 1.2rem; line-height: 1; }
  .sidebar-item .si-text { flex: 1; }
  .sidebar-item .si-name { font-size: 0.88rem; font-weight: 500; line-height: 1.2; }
  .sidebar-item .si-time { font-size: 0.75rem; color: var(--ink3); }
  .diff-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .diff-easy { background: var(--green); }
  .diff-medium { background: var(--amber); }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    max-width: 720px;
  }

  /* WELCOME */
  .welcome {
    padding: 3rem 2rem;
    text-align: center;
  }
  .welcome .big { font-size: 4rem; margin-bottom: 1rem; }
  .welcome h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
  }
  .welcome p { color: var(--ink2); font-size: 0.95rem; line-height: 1.7; max-width: 380px; margin: 0 auto; }

  /* RECIPE */
  .recipe-header {
    display: flex;
    align-items: flex-start;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .recipe-emoji {
    font-size: 3rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .recipe-title h2 {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 0.4rem;
  }
  .recipe-title p {
    color: var(--ink2);
    font-size: 0.9rem;
    line-height: 1.6;
    font-style: italic;
  }

  /* BADGES */
  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-blue { background: var(--blue-light); color: var(--blue); }
  .badge-red { background: var(--red-light); color: var(--red); }

  /* INFO GRID */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .info-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
  }
  .info-card .ic-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink3);
    margin-bottom: 4px;
  }
  .info-card .ic-val {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--ink);
  }

  /* DIVIDER */
  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  /* SECTIONS */
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 0.75rem;
    color: var(--ink);
  }

  /* INGREDIENTS */
  .ingredients {
    background: var(--amber-light);
    border: 1px solid rgba(200,134,42,0.25);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .ingredients ul { list-style: none; }
  .ingredients li {
    padding: 5px 0;
    font-size: 0.9rem;
    color: var(--ink);
    border-bottom: 1px solid rgba(200,134,42,0.15);
    display: flex;
    gap: 8px;
  }
  .ingredients li:last-child { border-bottom: none; }
  .ingredients li::before { content: '—'; color: var(--amber); flex-shrink: 0; }

  /* STEPS */
  .steps { margin-bottom: 1.5rem; }
  .step {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .step-num {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--amber);
    min-width: 28px;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .step-text {
    font-size: 0.92rem;
    line-height: 1.7;
    color: var(--ink);
    padding-top: 3px;
  }
  .step-text strong { font-weight: 500; }

  /* TIPS BOX */
  .tips-box {
    background: var(--green-light);
    border: 1px solid rgba(90,122,78,0.25);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .tips-box .tip-title {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--green);
    margin-bottom: 8px;
  }
  .tips-box ul { list-style: none; }
  .tips-box li {
    font-size: 0.88rem;
    color: var(--ink);
    padding: 4px 0;
    padding-left: 14px;
    position: relative;
    line-height: 1.6;
  }
  .tips-box li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--green);
    font-size: 0.8rem;
  }

  /* CARBONATION BOX */
  .carb-box {
    background: var(--blue-light);
    border: 1px solid rgba(58,96,128,0.25);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .carb-box .carb-title {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .carb-box p {
    font-size: 0.88rem;
    color: var(--ink);
    line-height: 1.7;
  }

  /* MOBILE */
  .mobile-nav {
    display: none;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    padding: 0.5rem;
    gap: 6px;
    white-space: nowrap;
  }
  .mobile-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    transition: background 0.1s;
    white-space: nowrap;
  }
  .mobile-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .mobile-btn:hover:not(.active) { background: var(--bg3); }

  @media (max-width: 680px) {
    .sidebar { display: none; }
    .mobile-nav { display: flex; }
    .content { padding: 1.25rem; }
    .recipe-header { flex-direction: column; gap: 0.5rem; }
    .recipe-emoji { font-size: 2.5rem; }
    .recipe-title h2 { font-size: 1.5rem; }
  }
</style>
</head>

function diffClass(d) { return d === 'Lett' ? 'diff-easy' : 'diff-medium'; }

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="sidebar-label">Velg drikk</div>';
  drinks.forEach(d => {
    html += `<div class="sidebar-item" id="si-${d.id}" onclick="show('${d.id}')">
      <span class="si-emoji">${d.emoji}</span>
      <span class="si-text">
        <span class="si-name">${d.name}</span>
        <span class="si-time">${d.time}</span>
      </span>
      <span class="diff-dot ${diffClass(d.difficulty)}"></span>
    </div>`;
  });
  sb.innerHTML = html;
}

function buildMobileNav() {
  const mn = document.getElementById('mobileNav');
  drinks.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'mobile-btn';
    btn.id = `mb-${d.id}`;
    btn.innerHTML = `${d.emoji} ${d.name}`;
    btn.onclick = () => show(d.id);
    mn.appendChild(btn);
  });
}

function show(id) {
  const d = drinks.find(x => x.id === id);
  if (!d) return;

  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.mobile-btn').forEach(el => el.classList.remove('active'));
  const si = document.getElementById(`si-${id}`);
  if (si) si.classList.add('active');
  const mb = document.getElementById(`mb-${id}`);
  if (mb) mb.classList.add('active');

  const diffBadge = d.difficulty === 'Lett'
    ? '<span class="badge badge-green">✓ Lett</span>'
    : '<span class="badge badge-amber">⚡ Middels</span>';

  const carbBadge = d.kullsyre.startsWith('Ja')
    ? '<span class="badge badge-blue">🫧 Kullsyre mulig</span>'
    : d.kullsyre === 'Litt naturlig'
    ? '<span class="badge badge-blue">🫧 Litt kullsyre</span>'
    : '<span class="badge badge-red">— Ingen kullsyre</span>';

  const stepsHtml = d.steps.map((s, i) => `
    <div class="step">
      <div class="step-num">${i + 1}</div>
      <div class="step-text"><strong>${s.t}:</strong> ${s.txt}</div>
    </div>
  `).join('');

  const tipsHtml = d.tips.map(t => `<li>${t}</li>`).join('');

  const carbHtml = d.kullsyreTips ? `
    <div class="carb-box">
      <div class="carb-title">🫧 Slik lager du kullsyre</div>
      <p>${d.kullsyreTips}</p>
    </div>` : '';

  const ingHtml = d.ingredienser.map(i =>
    i.startsWith('–') ? `<li style="font-weight:500; color:var(--amber); border-bottom:none; padding-top:10px">${i}</li>` : `<li>${i}</li>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="recipe-header">
      <div class="recipe-emoji">${d.emoji}</div>
      <div class="recipe-title">
        <h2>${d.name}</h2>
        <p>${d.tagline}</p>
      </div>
    </div>

    <div class="badges">
      ${diffBadge}
      ${carbBadge}
      <span class="badge badge-green">⏱ ${d.time}</span>
      <span class="badge badge-amber">🍶 ${d.alcPct} alkohol</span>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="ic-label">Utstyr</div>
        <div class="ic-val">${d.utstyr}</div>
      </div>
      <div class="info-card">
        <div class="ic-label">Tid totalt</div>
        <div class="ic-val">${d.time}</div>
      </div>
      <div class="info-card">
        <div class="ic-label">Kullsyre</div>
        <div class="ic-val">${d.kullsyre}</div>
      </div>
    </div>

    <hr class="section-divider">
    <div class="section-title">Ingredienser</div>
    <div class="ingredients">
      <ul>${ingHtml}</ul>
    </div>

    <div class="section-title">Fremgangsmåte</div>
    <div class="steps">${stepsHtml}</div>

    ${carbHtml}

    <hr class="section-divider">
    <div class="tips-box">
      <div class="tip-title">Tips og triks</div>
      <ul>${tipsHtml}</ul>
    </div>
  `;

  window.scrollTo({ top: 0 });
}

buildSidebar();
buildMobileNav();
</script>

</html>
